name: Sinyal Paneli Güncelle

on:
  workflow_dispatch:   # Manuel tetikleme (butondan)

jobs:
  guncelle:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Kütüphaneleri kur
        run: pip install yfinance requests beautifulsoup4

      - name: Verileri çek
        run: python fetch_data.py

      - name: data.json'u kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "veri güncellendi: $(date +'%d.%m.%Y %H:%M') TR"
          git push
